<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Deal Calculator</title>
  <style>
    body { font-family: Arial; max-width: 720px; margin: 30px auto; }
    input { width: 100%; padding: 10px; margin: 6px 0 14px; }
    .box { padding: 16px; border: 1px solid #ddd; border-radius: 10px; margin-top: 16px; }
    .result { font-size: 20px; font-weight: bold; }
  </style>
</head>
<body>

<h2>Deal Calculator (Chia lãi 50/50)</h2>

<label>Giá nhập</label>
<input id="buy" type="number" value="2000">

<label>Giá bán</label>
<input id="sell" type="number" value="2140">

<label>AT ứng</label>
<input id="at" type="number" value="40">

<label>CL ứng</label>
<input id="cl" type="number" value="1960">

<label>Chi phí vận chuyển</label>
<input id="ship" type="number" value="10">

<label>Chi phí lưu kho</label>
<input id="storage" type="number" value="5">

<label>Chi phí cafe</label>
<input id="cafe" type="number" value="2">

<button onclick="calc()">Tính</button>

<div class="box">
  <div>Lãi gộp: <span id="gross"></span></div>
  <div>Tổng chi phí: <span id="cost"></span></div>
  <div>Lãi ròng: <span id="net"></span></div>
  <div>Mỗi bên ăn: <span id="split"></span></div>
</div>

<div class="box">
  <div class="result">AT nhận: <span id="atResult"></span></div>
  <div class="result">CL nhận: <span id="clResult"></span></div>
</div>

<script>
function calc() {
  const buy = Number(document.getElementById("buy").value) || 0;
  const sell = Number(document.getElementById("sell").value) || 0;
  const at = Number(document.getElementById("at").value) || 0;
  const cl = Number(document.getElementById("cl").value) || 0;
  const ship = Number(document.getElementById("ship").value) || 0;
  const storage = Number(document.getElementById("storage").value) || 0;
  const cafe = Number(document.getElementById("cafe").value) || 0;

  const gross = sell - buy;
  const cost = ship + storage + cafe;
  const net = gross - cost;
  const split = net / 2;

  const atResult = at + split;
  const clResult = cl + split;

  document.getElementById("gross").innerText = gross;
  document.getElementById("cost").innerText = cost;
  document.getElementById("net").innerText = net;
  document.getElementById("split").innerText = split;
  document.getElementById("atResult").innerText = atResult;
  document.getElementById("clResult").innerText = clResult;
}

calc();
</script>

</body>
</html>
