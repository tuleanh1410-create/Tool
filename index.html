<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Deal Calculator</title>
  <style>
    body { font-family: Arial; max-width: 720px; margin: 30px auto; padding: 0 12px; background: #000; color: #fff; }
    input, select { width: 100%; padding: 10px; margin: 6px 0 14px; background: #222; color: #fff; border: 1px solid #444; }
    .row { display: grid; grid-template-columns: 1fr 120px; gap: 10px; }
    .box { padding: 16px; border: 1px solid #444; border-radius: 10px; margin-top: 16px; }
    .result { font-size: 20px; font-weight: bold; }
    button { padding: 10px; width: 100%; background: #444; color: #fff; border: none; }
  </style>
</head>
<body>

<h2>Deal Calculator 50/50</h2>

<label>Giá nhập</label>
<input id="buy" type="number" value="500">

<label>Giá vay (trừ khỏi giá bán)</label>
<input id="loan" type="number" value="500">

<label>Giá bán</label>
<input id="sell" type="number" value="546">

<label>AT ứng tiền hàng</label>
<input id="at" type="number" value="0">

<label>CL ứng tiền hàng</label>
<input id="cl" type="number" value="0">

<div class="row">
  <div>
    <label>Chi phí lưu kho</label>
    <input id="storage" type="number" value="55">
  </div>
  <select id="storageBy">
    <option value="AT">AT</option>
    <option value="CL">CL</option>
  </select>
</div>

<div class="row">
  <div>
    <label>Chi phí vận chuyển</label>
    <input id="ship" type="number" value="10">
  </div>
  <select id="shipBy">
    <option value="AT">AT</option>
    <option value="CL">CL</option>
  </select>
</div>

<div class="row">
  <div>
    <label>Chi phí cafe</label>
    <input id="cafe" type="number" value="0">
  </div>
  <select id="cafeBy">
    <option value="AT">AT</option>
    <option value="CL">CL</option>
  </select>
</div>

<button onclick="calc()">Tính</button>

<div class="box">
  <div>Tiền thực thu: <span id="realSell"></span></div>
  <div>Lãi gộp: <span id="gross"></span></div>
  <div>Tổng chi phí: <span id="cost"></span></div>
  <div>Lãi ròng: <span id="net"></span></div>
  <div>Mỗi bên ăn: <span id="split"></span></div>
</div>

<div class="box">
  <div>AT đã ứng chi phí: <span id="atCost"></span></div>
  <div>CL đã ứng chi phí: <span id="clCost"></span></div>
</div>

<div class="box">
  <div class="result">AT nhận: <span id="atResult"></span></div>
  <div class="result">CL nhận: <span id="clResult"></span></div>
</div>

<script>
function money(n) {
  return Number(n).toLocaleString("vi-VN");
}

function calc() {
  const buy = Number(document.getElementById("buy").value) || 0;
  const loan = Number(document.getElementById("loan").value) || 0;
  const sell = Number(document.getElementById("sell").value) || 0;
  const at = Number(document.getElementById("at").value) || 0;
  const cl = Number(document.getElementById("cl").value) || 0;

  const storage = Number(document.getElementById("storage").value) || 0;
  const ship = Number(document.getElementById("ship").value) || 0;
  const cafe = Number(document.getElementById("cafe").value) || 0;

  let atCost = 0;
  let clCost = 0;

  if (storage) (document.getElementById("storageBy").value === "AT") ? atCost += storage : clCost += storage;
  if (ship) (document.getElementById("shipBy").value === "AT") ? atCost += ship : clCost += ship;
  if (cafe) (document.getElementById("cafeBy").value === "AT") ? atCost += cafe : clCost += cafe;

  const realSell = sell - loan;
  const gross = realSell - buy;
  const cost = storage + ship + cafe;
  const net = gross - cost;
  const split = net / 2;

  const atResult = at + atCost + split;
  const clResult = cl + clCost + split;

  document.getElementById("realSell").innerText = money(realSell);
  document.getElementById("gross").innerText = money(gross);
  document.getElementById("cost").innerText = money(cost);
  document.getElementById("net").innerText = money(net);
  document.getElementById("split").innerText = money(split);

  document.getElementById("atCost").innerText = money(atCost);
  document.getElementById("clCost").innerText = money(clCost);

  document.getElementById("atResult").innerText = money(atResult);
  document.getElementById("clResult").innerText = money(clResult);
}

calc();
</script>

</body>
</html>
