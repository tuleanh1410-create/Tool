<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Deal Calculator</title>
  <style>
    body {
      font-family: Arial;
      max-width: 720px;
      margin: 30px auto;
      padding: 0 12px;
      background: #000;
      color: #fff;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 6px 0 14px;
      background: #222;
      color: #fff;
      border: 1px solid #444;
      box-sizing: border-box;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
    }

    .box {
      padding: 16px;
      border: 1px solid #444;
      border-radius: 10px;
      margin-top: 16px;
    }

    .result {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .note {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<h2>Deal Calculator</h2>

<label>Giá nhập</label>
<input id="buy" type="number" step="any">

<label>Giá vay</label>
<div class="row">
  <input id="loan" type="number" step="any">
  <select id="loanBy">
    <option>AT</option>
    <option>CL</option>
  </select>
</div>

<label>Giá bán</label>
<input id="sell" type="number" step="any">

<label>AT ứng</label>
<input id="at" type="number" step="any">

<label>CL ứng</label>
<input id="cl" type="number" step="any">

<label>Ngày nhập (dd/mm)</label>
<input id="buyDate" placeholder="12/08">

<label>Ngày bán (dd/mm)</label>
<input id="sellDate" placeholder="15/08">

<label>Rate lưu kho/ngày</label>
<input id="rate" type="number" value="700">

<label>Số ngày</label>
<input id="days" readonly>

<label>Chi phí lưu kho</label>
<div class="row">
  <input id="storage" readonly>
  <select id="storageBy">
    <option>AT</option>
    <option>CL</option>
  </select>
</div>

<label>Vận chuyển</label>
<div class="row">
  <input id="ship" type="number" step="any">
  <select id="shipBy">
    <option>AT</option>
    <option>CL</option>
  </select>
</div>

<label>Cafe</label>
<div class="row">
  <input id="cafe" type="number" step="any">
  <select id="cafeBy">
    <option>AT</option>
    <option>CL</option>
  </select>
</div>

<div class="box">
  <div>Lãi ròng: <span id="net"></span></div>
  <div>Lãi mỗi bên: <span id="split"></span></div>
</div>

<div class="box">

  <div class="result">
    AT nhận: <span id="atResult"></span>
    <div class="note" id="atNote"></div>
  </div>

  <div class="result">
    CL nhận: <span id="clResult"></span>
    <div class="note" id="clNote"></div>
  </div>

</div>

<script>

function money(n){
  return Number(n).toLocaleString("vi-VN", {
    minimumFractionDigits: 1,
    maximumFractionDigits: 1
  });
}

function parseDM(str){
  const [d,m] = str.split("/").map(Number);

  if(!d || !m) return null;

  return {d,m};
}

function getDays(){

  const s = parseDM(document.getElementById("buyDate").value);
  const e = parseDM(document.getElementById("sellDate").value);

  if(!s || !e) return 0;

  const y = new Date().getFullYear();

  const start = new Date(y, s.m - 1, s.d);

  let end = new Date(y, e.m - 1, e.d);

  // qua năm
  if(end < start){
    end = new Date(y + 1, e.m - 1, e.d);
  }

  const diff = Math.round(
    (end - start) / (1000 * 60 * 60 * 24)
  );

  return diff >= 0 ? diff + 1 : 0;
}

function calc(){

  const buy = +document.getElementById("buy").value || 0;

  const loan = +document.getElementById("loan").value || 0;

  const sell = +document.getElementById("sell").value || 0;

  const at = +document.getElementById("at").value || 0;

  const cl = +document.getElementById("cl").value || 0;

  const rate = +document.getElementById("rate").value || 0;

  const days = getDays();

  const storage = (loan * rate * days) / 1000000;

  document.getElementById("days").value = days;

  document.getElementById("storage").value =
    storage.toFixed(1);

  const ship = +document.getElementById("ship").value || 0;

  const cafe = +document.getElementById("cafe").value || 0;

  // 🔥 LÃI ĐÚNG
  const net =
    sell
    - buy
    - storage
    - ship
    - cafe;

  const split = net / 2;

  let atExtra = at;
  let clExtra = cl;

  let atBreakdown = ["lãi"];
  let clBreakdown = ["lãi"];

  if(at > 0){
    atBreakdown.push("AT ứng");
  }

  if(cl > 0){
    clBreakdown.push("CL ứng");
  }

  // giá vay
  if(document.getElementById("loanBy").value === "AT"){
    atExtra += loan;
    atBreakdown.push("giá vay");
  } else {
    clExtra += loan;
    clBreakdown.push("giá vay");
  }

  // lưu kho
  if(document.getElementById("storageBy").value === "AT"){
    atExtra += storage;
    atBreakdown.push("lưu kho");
  } else {
    clExtra += storage;
    clBreakdown.push("lưu kho");
  }

  // ship
  if(document.getElementById("shipBy").value === "AT"){
    atExtra += ship;
    atBreakdown.push("vận chuyển");
  } else {
    clExtra += ship;
    clBreakdown.push("vận chuyển");
  }

  // cafe
  if(document.getElementById("cafeBy").value === "AT"){
    atExtra += cafe;
    atBreakdown.push("cafe");
  } else {
    clExtra += cafe;
    clBreakdown.push("cafe");
  }

  const atResult = split + atExtra;

  const clResult = split + clExtra;

  document.getElementById("net").innerText =
    money(net);

  document.getElementById("split").innerText =
    money(split);

  document.getElementById("atResult").innerText =
    money(atResult);

  document.getElementById("clResult").innerText =
    money(clResult);

  document.getElementById("atNote").innerText =
    "(" + atBreakdown.join(" + ") + ")";

  document.getElementById("clNote").innerText =
    "(" + clBreakdown.join(" + ") + ")";
}

document.querySelectorAll("input,select").forEach(e => {

  e.addEventListener("input", calc);

  e.addEventListener("change", calc);

});

calc();

</script>

</body>
</html>
