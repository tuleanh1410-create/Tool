<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Tool tính dòng tiền</title>
  <style>
    body { font-family: Arial; max-width: 720px; margin: 30px auto; }
    input { width: 100%; padding: 10px; margin: 6px 0 14px; }
    .box { padding: 16px; border: 1px solid #ddd; border-radius: 10px; margin-top: 16px; }
    .result { font-size: 22px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Tool tính tiền về TK CL</h2>

  <label>Tiền gốc về CL</label>
  <input id="base" type="number" value="2140">

  <label>Phí / lãi / phần cộng thêm</label>
  <input id="extra" type="number" value="14.7">

  <label>Tiền ứng bởi CL</label>
  <input id="clAdvance" type="number" value="0">

  <label>Tiền ứng bởi AT</label>
  <input id="atAdvance" type="number" value="40.15">

  <button onclick="calc()">Tính</button>

  <div class="box">
    <p>Tiền về TK CL:</p>
    <div class="result" id="result">0</div>
  </div>

  <script>
    function calc() {
      const base = Number(document.getElementById("base").value) || 0;
      const extra = Number(document.getElementById("extra").value) || 0;
      const clAdvance = Number(document.getElementById("clAdvance").value) || 0;
      const atAdvance = Number(document.getElementById("atAdvance").value) || 0;

      // Logic đúng:
      // Nếu tiền ứng bởi CL đã nằm trong base thì KHÔNG cộng lại.
      // Tiền AT ứng thì cộng vào tiền về CL nếu CL cần nhận lại khoản đó.
      const totalToCL = base + extra + atAdvance;

      document.getElementById("result").innerText =
        totalToCL.toLocaleString("vi-VN") + " triệu";
    }

    calc();
  </script>
</body>
</html>
